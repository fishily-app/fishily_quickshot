<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/quickshot.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fishily Quickshot helps you create social-ready screenshot graphics with customizable layout, phone placement, and export."
    />
    <script>
      (() => {
        const storageKey = "qs-theme";
        const storedTheme = window.localStorage.getItem(storageKey);
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <title>Fishily Quickshot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
